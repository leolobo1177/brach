<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overlay Menu - FKScreamer Local + GSAP Weight</title>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <!-- Anton (kickers pequenos) -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <!-- Archivo (variable, wght 100..900) -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62.5..125,100..900&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue: #07104F;
      --cream: #FFF6D6;
      --ease: cubic-bezier(.2,.8,.2,1);
      --font-kicker: "Anton", system-ui, sans-serif;
      --font-fk: "Archivo", system-ui, sans-serif;
    }

    /* =========================
       FONTS LOCAIS (pasta /font)
       Ajuste as extensões se necessário.
    ========================= */

    @font-face{
      font-family: "FKScreamer";
      src:
        url("./font/FKScreamerTrial-Bold.woff2") format("woff2"),
        url("./font/FKScreamerTrial-Bold.woff") format("woff"),
        url("./font/FKScreamerTrial-Bold.otf") format("opentype"),
        url("./font/FKScreamerTrial-Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face{
      font-family: "FKScreamer";
      src:
        url("./font/FKScreamerTrial-Black.woff2") format("woff2"),
        url("./font/FKScreamerTrial-Black.woff") format("woff"),
        url("./font/FKScreamerTrial-Black.otf") format("opentype"),
        url("./font/FKScreamerTrial-Black.ttf") format("truetype");
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    *{ box-sizing: border-box; }
    body{
      margin: 0;
      background: #0b0f23;
      color: #fff;
      overflow-x: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* ================= TOPBAR ================= */
    .topbar{
      position: fixed;
      inset: 0 0 auto 0;
      height: 76px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      z-index: 70;
      pointer-events: none;
      background: transparent;
    }
    .topbar__inner{
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: auto;
    }

    .brand{
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: inherit;
    }
    .brand__mark{
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }
    .brand__mark svg{ width: 22px; height: 22px; fill: var(--cream); opacity: .95; }

    /* MENU button (SEM ícone) + FKScreamer + tamanho maior */
    .menu-open{
      appearance: none;
      border: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      padding: 10px 0;
      -webkit-tap-highlight-color: transparent;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .95;
      display: inline-flex;
      align-items: center;
    }
    .menu-open:focus-visible{ outline: none; }

    .menu-open .hover-gsap{
      font-family: var(--font-fk);
      display: inline-block;
      font-size: 26px;
      letter-spacing: .10em;
      line-height: 1;
    }

    /* ================= OVERLAY ================= */
    .overlay{
      position: fixed;
      inset: 0;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s var(--ease);
    }
    .overlay.is-open{
      opacity: 1;
      pointer-events: auto;
    }

    .overlay__panel{
      position:absolute;
      inset:0;
      background: var(--cream);
      color: var(--blue);
      transform: translateY(-6px) scale(1.01);
      filter: blur(2px);
      transition: transform .45s var(--ease), filter .45s var(--ease);
    }
    .overlay.is-open .overlay__panel{
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .overlay__inner{
      height: 100%;
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 28px;
      padding: 90px 44px 40px;
    }

    .overlay__art{
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      min-height: 72vh;
    }
    .svg-mark{
      position: absolute;
      left: -10%;
      top: 50%;
      transform: translateY(-50%) rotate(-6deg);
      width: 145%;
      height: auto;
      opacity: .92;
      pointer-events:none;
      user-select:none;
      filter: drop-shadow(0 30px 80px rgba(0,0,0,.18)) brightness(0) saturate(100%) invert(96%) sepia(19%) saturate(242%) hue-rotate(339deg) brightness(103%) contrast(95%);
    }
    .svg-mark *{ fill: var(--blue) !important; stroke: none !important; }

    .overlay__right{
      position: relative;
      display:flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
      min-width: 0;
    }

    /* FECHAR na mesma posição do MENU (topo direito) + FKScreamer + maior */
    .overlay__close{
      position: fixed;
      top: 0;
      right: 0;

      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;

      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 18px;
      height: 76px;
      display: inline-flex;
      align-items: center;
      opacity: .92;
      -webkit-tap-highlight-color: transparent;
    }
    .overlay__close:focus-visible{ outline: none; }

    .overlay__close .hover-gsap{
      font-family: var(--font-fk);
      display: inline-block;
      font-size: 26px;
      letter-spacing: .10em;
      line-height: 1;
    }

    /* ================= LINKS MENU ================= */
    .overlay__nav{
      margin-top: 10px;
      display: grid;
      gap: 10px;
      width: 100%;
      align-items: start;
    }

    .navlink{
      text-decoration: none;
      color: var(--blue);
      display: inline-block;
      width: fit-content;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ghost reserva o estado mais pesado -> Serviços não mexe nos outros */
    .navlink::before{
      content: attr(data-text);
      display: block;
      height: 0;
      overflow: hidden;
      visibility: hidden;

      font-family: var(--font-fk);
      font-weight: 900;

      text-transform: uppercase;
      font-size: clamp(62px, 6.2vw, 122px);
      line-height: .86;
      letter-spacing: .02em;
    }

    .navtext{
      font-family: var(--font-fk);
      text-transform: uppercase;
      font-size: clamp(62px, 6.2vw, 122px);
      line-height: .86;
      letter-spacing: .02em;
      display: inline-block;
    }

    /* ================= CONTATO + UNDERLINE (só no texto) ================= */
    .overlay__contact{
      margin-top: 18px;
      width: 100%;
      display: grid;
      gap: 14px;
    }
    .kicker{
      font-family: var(--font-kicker);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-size: 12px;
      opacity: .55;
    }

    .email-row{
      display:flex;
      align-items:center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* underline fica exatamente no texto (span) */
    .u{
      position: relative;
      display: inline-block;
      width: fit-content;
    }
    .u::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:100%;
      height:2px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin:left;
      transition: transform .35s var(--ease);
      opacity:.65;
    }
    .underline:hover .u::after{ transform: scaleX(1); }

    .email{
      text-decoration:none;
      color: var(--blue);
      font-family: var(--font-fk);
      font-weight: 700;
      font-size: clamp(22px, 2.1vw, 38px);
      line-height: 1;
      display: inline-block;
      letter-spacing: .01em;
    }

    .copy-btn{
      appearance:none;
      border: 1px solid rgba(7,16,79,.25);
      background: rgba(7,16,79,.06);
      color: var(--blue);
      border-radius: 999px;
      padding: 10px 12px;
      cursor:pointer;

      display:inline-flex;
      align-items:center;
      gap: 8px;

      font-family: var(--font-kicker);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      font-size: 12px;

      transition: transform .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn:hover{
      transform: translateY(-1px);
      background: rgba(7,16,79,.10);
      border-color: rgba(7,16,79,.35);
    }
    .copy-btn:focus-visible{ outline: none; }
    .copy-ico{ width: 16px; height: 16px; }

    .copy-toast{
      font-family: var(--font-kicker);
      font-size: 12px;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(4px);
      color: rgba(7,16,79,.85);
    }

    .social-grid{
      width: 100%;
      max-width: 520px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 22px;
    }
    .social{
      text-decoration:none;
      color: var(--blue);
      font-family: var(--font-kicker);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      font-size: 14px;
      opacity: .85;
      display:inline-flex;
      align-items:center;
      gap:10px;
      width: fit-content;
    }
    .arrow{ width:14px; height:14px; }
    .social-ico{
      width: 14px;
      height: 14px;
      display: inline-block;
    }

    /* MOBILE */
    @keyframes wiggle{
      0%{ transform: translateX(0) rotate(0deg); }
      20%{ transform: translateX(-1px) rotate(-2deg); }
      40%{ transform: translateX(2px) rotate(2deg); }
      60%{ transform: translateX(-2px) rotate(-1deg); }
      80%{ transform: translateX(1px) rotate(1deg); }
      100%{ transform: translateX(0) rotate(0deg); }
    }

    .social-icons{ display:none; gap: 14px; align-items:center; justify-content:center; margin-top: 10px; }
    .icon-link{
      width: 44px; height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(7,16,79,.18);
      background: rgba(7,16,79,.06);
      display:grid; place-items:center;
      color: var(--blue);
      transition: transform .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .icon-link:hover{ animation: wiggle .35s linear 1; background: rgba(7,16,79,.10); border-color: rgba(7,16,79,.28); }
    .icon-link:active{ animation: wiggle .35s linear 1; transform: scale(.98); }
    .icon-link svg{ width: 20px; height: 20px; }
    .icon-link img{
      width: 20px;
      height: 20px;
      display: block;
    }

    @media (max-width: 1200px){
      .overlay__inner{
        grid-template-columns: 1fr;
        padding: 76px 20px 28px;
        gap: 18px;
      }
      .overlay__art{ display:none; }
      .overlay__right{ align-items: center; text-align: center; }
      .overlay__nav{ justify-items: center; }
      .navlink{ width: 100%; display:flex; justify-content:center; }

      .overlay__contact{ justify-items: center; }
      .email-row{
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .social-grid{ justify-items: center; margin: 0 auto; }
    }

    @media (max-width: 920px){
      .overlay__inner{
        grid-template-columns: 1fr;
        padding: 76px 20px 28px;
        gap: 18px;
      }
      .overlay__art{ display:none; }
      .overlay__right{ align-items: center; text-align: center; }
      .overlay__nav{ justify-items: center; }
      .navlink{ width: 100%; display:flex; justify-content:center; }

      .overlay__contact{ justify-items: center; }
      .email-row{
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .social-grid{ display:none; }
      .social-icons{ display:flex; }
    }

    /* demo */
    main{ width:min(1200px,100%); margin:0 auto; padding:110px 18px 140px; }
    section{
      border:1px dashed rgba(255,255,255,.16);
      border-radius:18px;
      padding:24px;
      margin:18px 0;
      background: rgba(255,255,255,.03);
      min-height: 60vh;
    }
    h2{ margin:0 0 10px; font-family: var(--font-kicker); text-transform:uppercase; letter-spacing:1.2px; }
    p{ margin:0; opacity:.85; line-height:1.55; }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; animation:none !important; }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="#topo" aria-label="Início">
        <div class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 2l9 5v10l-9 5-9-5V7l9-5zm0 2.2L5 7.9v8.2l7 3.9 7-3.9V7.9l-7-3.7z"/>
          </svg>
        </div>
      </a>

      <button class="menu-open" id="openMenu" type="button" aria-label="Abrir menu">
        <span class="hover-gsap" id="menuLabel">MENU</span>
      </button>
    </div>
  </header>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay__panel" role="dialog" aria-modal="true" aria-label="Menu">
      <div class="overlay__inner">

        <div class="overlay__art" aria-hidden="true">
          <img class="svg-mark" src="./assets/logo.svg" alt="" />
        </div>

        <div class="overlay__right">

          <button class="overlay__close" id="closeMenu" type="button" aria-label="Fechar menu">
            <span class="hover-gsap" id="closeLabel">FECHAR</span>
          </button>

          <nav class="overlay__nav" aria-label="Menu">
            <a class="navlink" href="#sobre" data-text="SOBRE">
              <span class="navtext hover-gsap">SOBRE</span>
            </a>
            <a class="navlink" href="#servicos" data-text="SERVIÇOS">
              <span class="navtext hover-gsap">SERVIÇOS</span>
            </a>
            <a class="navlink" href="#cases" data-text="CASES">
              <span class="navtext hover-gsap">CASES</span>
            </a>
            <a class="navlink" href="#contato" data-text="CONTATO">
              <span class="navtext hover-gsap">CONTATO</span>
            </a>
          </nav>

          <div class="overlay__contact">
            <div>
              <div class="kicker">(E-MAIL)</div>
              <div class="email-row">
                <a class="email underline" id="emailLink" href="mailto:hello@seudominio.com">
                  <span class="u">hello@seudominio.com</span>
                </a>

                <button class="copy-btn" id="copyEmailBtn" type="button" aria-label="Copiar e-mail">
                  <svg class="copy-ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M9 9h10v12H9V9Z" stroke="currentColor" stroke-width="2" />
                    <path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="2" />
                  </svg>
                  Copiar
                </button>

                <span class="copy-toast" id="copyToast">Copiado!</span>
              </div>
            </div>

            <div>
              <div class="kicker">(REDES SOCIAIS)</div>

              <div class="social-grid">
                <a class="social underline" href="https://instagram.com" target="_blank" rel="noopener">
                  <span class="u">Instagram</span>
                  <img class="social-ico" src="./assets/instagram.svg" alt="" aria-hidden="true" />
                </a>

                <a class="social underline" href="https://linkedin.com" target="_blank" rel="noopener">
                  <span class="u">LinkedIn</span>
                  <img class="social-ico" src="./assets/linkedin.svg" alt="" aria-hidden="true" />
                </a>

                <a class="social underline" href="https://behance.net" target="_blank" rel="noopener">
                  <span class="u">Behance</span>
                  <img class="social-ico" src="./assets/behance.svg" alt="" aria-hidden="true" />
                </a>

                <a class="social underline" href="https://x.com" target="_blank" rel="noopener">
                  <span class="u">X/Twitter</span>
                  <img class="social-ico" src="./assets/twitter.svg" alt="" aria-hidden="true" />
                </a>
              </div>

              <div class="social-icons" aria-label="Redes sociais (ícones)">
                <a class="icon-link" href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
                  <img src="./assets/instagram.svg" alt="" aria-hidden="true" />
                </a>
                <a class="icon-link" href="https://linkedin.com" target="_blank" rel="noopener" aria-label="LinkedIn">
                  <img src="./assets/linkedin.svg" alt="" aria-hidden="true" />
                </a>
                <a class="icon-link" href="https://behance.net" target="_blank" rel="noopener" aria-label="Behance">
                  <img src="./assets/behance.svg" alt="" aria-hidden="true" />
                </a>
                <a class="icon-link" href="https://x.com" target="_blank" rel="noopener" aria-label="X/Twitter">
                  <img src="./assets/twitter.svg" alt="" aria-hidden="true" />
                </a>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <main id="topo">
    <section id="sobre"><h2>Sobre</h2><p>Abra o menu e teste hover.</p></section>
    <section id="servicos"><h2>Serviços</h2><p>“Serviços” não empurra outros itens.</p></section>
    <section id="cases"><h2>Cases</h2><p>Conteúdo exemplo.</p></section>
    <section id="contato"><h2>Contato</h2><p>Conteúdo exemplo.</p></section>
  </main>

  <script>
    const overlay = document.getElementById('overlay');
    const openMenu = document.getElementById('openMenu');
    const closeMenu = document.getElementById('closeMenu');

    const overlayPanel = document.querySelector('.overlay__panel');
    const overlayRight = document.querySelector('.overlay__right');
    const navLinks = gsap.utils.toArray('.overlay__nav .navlink');
    const contactBlocks = gsap.utils.toArray('.overlay__contact > div');

    const copyBtn = document.getElementById('copyEmailBtn');
    const emailLink = document.getElementById('emailLink');
    const copyToast = document.getElementById('copyToast');

    const menuTl = gsap.timeline({
      paused: true,
      defaults: { ease: "power3.out" }
    });

    menuTl
      .fromTo(overlay, { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.22, ease: "power2.out" }, 0)
      .fromTo(overlayPanel, { y: -8, scale: 1.01, filter: "blur(2px)" }, { y: 0, scale: 1, filter: "blur(0px)", duration: 0.5 }, 0)
      .fromTo(overlayRight, { y: 12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45 }, 0.06)
      .fromTo(navLinks, { y: 12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45, stagger: 0.05 }, 0.1)
      .fromTo(contactBlocks, { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, stagger: 0.06 }, 0.18);

    function openOverlay(){
      if(overlay.classList.contains('is-open')) return;
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
      menuTl.play(0);
    }
    function closeOverlayMenu(){
      if(!overlay.classList.contains('is-open')) return;
      menuTl.reverse();
      menuTl.eventCallback("onReverseComplete", () => {
        overlay.classList.remove('is-open');
        overlay.setAttribute('aria-hidden','true');
        document.body.style.overflow = '';
        gsap.set(overlay, { clearProps: "opacity,visibility" });
      });
    }

    openMenu.addEventListener('click', openOverlay);
    closeMenu.addEventListener('click', closeOverlayMenu);
    window.addEventListener('keydown', (e) => {
      if(e.key === 'Escape' && overlay.classList.contains('is-open')) closeOverlayMenu();
    });

    gsap.set(".hover-gsap", {
      fontVariationSettings: "'wght' 480"
    });

    document.querySelectorAll(".hover-gsap").forEach(el => {
      el.addEventListener("mouseenter", () => {
        gsap.to(el, {
          fontVariationSettings: "'wght' 760",
          duration: 0.4,
          ease: "power3.out",
          overwrite: "auto"
        });
      });

      el.addEventListener("mouseleave", () => {
        gsap.to(el, {
          fontVariationSettings: "'wght' 480",
          duration: 0.4,
          ease: "power3.out",
          overwrite: "auto"
        });
      });

      el.addEventListener("focus", () => {
        gsap.to(el, {
          fontVariationSettings: "'wght' 760",
          duration: 0.35,
          ease: "power3.out",
          overwrite: "auto"
        });
      });

      el.addEventListener("blur", () => {
        gsap.to(el, {
          fontVariationSettings: "'wght' 480",
          duration: 0.35,
          ease: "power3.out",
          overwrite: "auto"
        });
      });
    });

    /* Copy email */
    async function copyEmail(){
      const emailText = (emailLink?.innerText || "").trim();
      if(!emailText) return;

      try{
        await navigator.clipboard.writeText(emailText);
        gsap.killTweensOf(copyToast);
        gsap.set(copyToast, { opacity: 0, y: 4 });
        gsap.to(copyToast, { opacity: 1, y: 0, duration: 0.18, ease: "power2.out" });
        gsap.to(copyToast, { opacity: 0, y: 4, duration: 0.22, ease: "power2.in", delay: 1.0 });
      }catch{
        const ta = document.createElement("textarea");
        ta.value = emailText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
    }
    copyBtn?.addEventListener("click", copyEmail);
  </script>

</body>
</html>
